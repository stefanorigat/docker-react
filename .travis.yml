language: generic
sudo: required
services:
    - docker

before_install:
    - docker build -t stefanorigat/docker-react -f Dockerfile.dev .

script:
    - docker run -e CI=true stefanorigat/docker-react npm run test

deploy:
    provider: azure_web_apps
    username: $AZURE_USERNAME
    password: $AZURE_PWD
    site: "react-docker"
    edge: true

